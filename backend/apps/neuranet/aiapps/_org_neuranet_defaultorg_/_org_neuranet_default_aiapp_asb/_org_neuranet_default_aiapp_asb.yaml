# This YAML file is the core of any AI application. The ID in the file, the file name and the hosting folder must
# match. The file documents rest of the commands and syntax.
#
# ASB JS inline code syntax checker template below for Yaml inline code
# (async function anonymous(flow,routeName,js,messageContainer,message) {
#    // add your JS node code here and check in any Javascript syntax checker
# })

---
id: _org_neuranet_default_aiapp_asb           # the AI application name / ID
interface:                                    # the interface details
  type: custom                                # this is for the frontend can be chat, translate or search interfaces
  label: AI assistant                         # the label for the app icon on the UI
  icon: data:image/svg+xml;base64,
  skippable_file_patterns:                    # skip these files from references
    - ^_neuranet_generated?.+
    - ^\.system?.+
endpoint: llmflow                             # the API endpoint - usually llmflow
users: ["*"]                                  # the * means all users, else must be an array of user IDs
admins:                                       # the admins for this app - they can train for example
  - thecompany@tekmonks.com
  - rvkapoor@tekmonks.com     
unattended_id: rvkapoor@tekmonks.com          # ID for unattended operation - used by ASB plugin, for example
api_uploads_cms_path: uploads                 # where files are uploaded by index, unindex APIs
generated_files_path: _neuranet_generated     # where generated files are placed
ai_cost_quota: 0.6                            # cost quota for the users, -1 disables checks also
disable_quota_checks: true                    # disable quotas if true
disable_model_usage_logging: true             # if true, ai model usage logging
default_embeddings_model: embedding-openai    # model for embedding file ingestion
ingestiondbs: ["nntfidfdb", "nnvectordb"]     # the ingestion databases - tf.idf and vector in this case

# all flows are sequence of commands which follow the same syntax - command, in, out - in is the input
# to the command, out is the variable holding the output and name points to the command module and entry
# point. the command sytax is documented below as well.

pregen_flow: 
  - command: rephrasedoc                      # entry function name is skipped as the default is generate anyways
    in: 
      label: Rephrased

      prompt: |                               # these can be prompt, prompt_docISOLanguage, prompt_fragment_fragmentISOLanguage
        Rephrase the document below with alternate keywords.
        {{{fragment}}}
      prompt_hi: |
        नीचे दिए गए दस्तावेज़ को वैकल्पिक कीवर्ड के साथ पुनः लिखें।
        {{{fragment}}}

      models: 
        - name: simplellm-openai
          type: chat
          model_overrides:                    # this allows us to override model params on a per AI app basis, can be a nested path e.g. driver.host if we are calling API at a different host name etc          
        - name: embedding-openai
          type: embeddings
          model_overrides:                      
      pregenfile_prefix: reworded
      pregenfile_dir: _neuranet_generated
      pregenfile_ext: txt
      encoding: utf8


llm_flow:   
  - command: asbagent                       # default function entry is answer so entry function name is skipped
    in: 
      session_id: "{{{request.session_id}}}" 
      message_id: "{{{request.message_id}}}"
      question: "{{{query}}}"
      raw_question: "{{{query}}}"
      aiappid: "{{{aiappid}}}"
      code_max_retries: 3
      cutoff_score_tfidf: 0.4
      chunk_size: 128000
      matchers_for_reference_links: 
        - (?:.+\/)?_neuranet_generated\/summary_(.+)\.txt
        - (?:.+\/)?_neuranet_generated\/reworded_(.+)\.txt
      files_js: return request.files
      tmp_dir_name: /tempdir/
      model: {"name": "chat-knowledgebase-openai"}

      asbflow:
        flow:
          name: Knowledge lake chat using ASB
          expandRouteProperties: true
          ignorefatalerrors: true
          cpuInterval: 1000

        listener.inproc:
          type: inproc_listener
          isMessageGenerator: true

        listener.email:
          type: imap
          isMessageGenerator: true
          mailbox: INBOX
          user: neuranet@tekmonks.com
          password: 268e96dce29c2b126b610ed7a9e5649d323c2c156b16e85d
          host: imap.gmail.com
          port: 993
          tls: true
          maxmessages: 10
          maxEmailSize: 20971520
          partsToInject: ["envelope", "text", "attachments"]

        route.convertemail:
          type: js
          dependencies: listener.email 
          isAsync: true
          js: |
            const emailQuestion = (message.content.envelope.subject||"") + "\n" + message.content.texts.join("\n");
            message.content.request = {}; message.content.query = emailQuestion; 
            message.content.raw_question = emailQuestion; message.content.message_id = message.content.envelope.messageId;
            message.content = await flow.env.asbagent_params.asbagent.getMessageContent({...flow.env.asbagent_params, ...message.content});
            
        route.expand_query:
          type: js
          dependencies: listener.inproc || route.convertemail
          isAsync: true
          js: |
            const expandqueryPlugin = await message.content.getPlugin("expandquery");
            const prompt = message.content.getPrompt("expand_query_prompt");
            const params = {...message.content, model: {name: "simplellm-openai"}, prompt};
            message.content.searchquery = await expandqueryPlugin.expand(params);
        
        route.doctfidfsearch:
          type: js
          dependencies: route.expand_query || route.expand_query.error
          isAsync: true
          js: |
            /** The code below is on purpose to show how to run retry and other very
            /** advanced AI routing loops, including graph routing, inside the ASB flow. 
            /** Uncomment to see how it works. 
            if (message.getGCEligibleCounter() === undefined) { // test rerouting loop
              message.setGCEligibleCounter(1);        // go around once more
              message.modifyRouteStamp(["listener"]); // starting from the expansion node as it expects listener messages
              return;
            } else message.decrementGCEligibleCounter();  // stops the loop
            **/
            const content = message.content, docsearchmod = await content.getPlugin("doctfidfsearch");
            message.content.documents = await docsearchmod.search({...content, topK: 3,
              query: content.searchquery||content.query,  // if expand query failed, then use content.query which is the original question
              embeddings_model: {name: "embedding-openai"}, 
              bridges: content.request.bridges||[content.aiappid], 
              metadata_filter_function: content.request.metadata_filter_function, 
              punish_verysmall_documents: content.request.punish_verysmall_documents !== undefined ? 
                content.request.punish_verysmall_documents : false, 
              bm25: content.request.bm25 !== undefined ? content.request.bm25 : false});

        route.llm_history_chat:
          type: js
          dependencies: route.doctfidfsearch
          isAsync: true
          js: |
            const prompt = message.content.getPrompt("llm_history_chat_prompt");
            const chatmod = await message.content.getPlugin("llm_history_chat");
            const matchers_for_reference_links = ["(?:.+\/)?_neuranet_generated\/summary_(.+)\.txt", 
              "(?:.+\/)?_neuranet_generated\/reworded_(.+)\.txt"];
            message.content.airesponse = await chatmod.answer({...message.content, 
              model: {name: "chat-knowledgebase-openai"}, matchers_for_reference_links, 
              question: message.content.query, prompt});

        route.emailreplycreator: 
          type: js
          dependencies: listener.email && (route.llm_history_chat || route.llm_history_chat.error || route.doctfidfsearch.error)
          isAsync: true
          js: |
            const airesponse = message.content.airesponse || {result: false, reason: message.content.reasons.INTERNAL};
            if (!airesponse.jsonResponse) airesponse.jsonResponse = {response: airesponse.response};  
            message.content.html = airesponse.result ? message.content.md2html(airesponse.jsonResponse.response) : "Error";
            message.content.text = airesponse.result ? message.content.md2text(airesponse.jsonResponse.response) : "Error";
            message.content.to = `"${message.content.envelope.from[0].name||message.content.envelope.from[0].address}" <${message.content.envelope.from[0].address}>`;
            message.content.title = `Re: ${message.content.envelope.subject}`;
            message.content.from = `"Neuranet AI" <neuranet@tekmonks.com>`;

        output.inproc:
          type: inproc_responder
          dependencies : listener.inproc && (route.llm_history_chat || route.llm_history_chat.error || route.doctfidfsearch.error)

        output.email:
          type: email
          dependencies : route.emailreplycreator
          host: smtp.gmail.com
          port: 587
          secure: false
          user: neuranet@tekmonks.com
          password: 268e96dce29c2b126b610ed7a9e5649d323c2c156b16e85d
          
    out: airesponse                         # the final response must output to this property - airesponse for LLM flows


global_models:
  - name: embedding-openai
    model_overrides:                    
      read_ai_response_from_samples: true

  - name: chat-knowledgebase-openai
    model_overrides:                    
      read_ai_response_from_samples: true

  - name: simplellm-openai
    model_overrides:                    
      read_ai_response_from_samples: true


modules: 
  llm_history_chat: llm_history_chat.js