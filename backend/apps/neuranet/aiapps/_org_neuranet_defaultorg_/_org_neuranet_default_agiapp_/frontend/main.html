<style>
::-webkit-scrollbar {
    width: 0.5em !important;
    height: 0.5em !important;
    scroll-behavior: smooth !important;
}

::-webkit-scrollbar-track {
    -webkit-box-shadow: inset 0 0 6px rgba(0, 0, 0, 0.3) !important;
    box-shadow: inset 0 0 6px rgba(0, 0, 0, 0.3) !important;
    margin: 2em;
    border-radius: 1em !important;
}

::-webkit-scrollbar-thumb {
    background-color: darkgrey !important;
    border-radius: 1em !important;
    background-clip: padding-box;
}

div#maincontainer {
    width: 100%;
    height: 100%;
    display: flex; 
    flex-direction: row;
}
chat-box#enterpriseassistant {width: 100%;}
</style>

<div id="maincontainer">

<chat-box id="enterpriseassistant" chatapi="{{APP_CONSTANTS.API_PATH}}/{{aiendpoint}}"
    attach="true" attachaccepts=".txt,.docx,.pdf,.xlsx" maxattachsize="4194304" maxattachsizeerror="{{i18n.MaxSizeError}}"
    maxattachments="4" maxattachmentserror="{{i18n.MaxAttachmentsError}}"
    tts="false" stt="false" typewriter="2" greeting="{{greeting}}"
    onrequest="window.monkshu_env.apps[APP_CONSTANTS.APP_NAME].custom_enterprise_assist_main.getAssistantResult(prompt, files, message_id, chatbox, '{{{activeaiapp.id}}}')"></chat-box>

</div>
